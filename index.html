<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Albatros.studio</title>
    <meta
      name="description"
      content="Collectif créatif basé en Belgique, nous développons des projets culturels et créatifs."
    />
    <style>
      :root {
        --bg: #f4f1ea;
        --surface: #fffdf8;
        --text: #1b1b1b;
        --muted: #5f5a52;
        --accent: #0b6e4f;
        --border: #ded8ce;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 10%, #efe7d7 0, transparent 40%),
          radial-gradient(circle at 80% 90%, #e7efe7 0, transparent 45%),
          var(--bg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: 100%;
        max-width: 680px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        letter-spacing: 0.01em;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: var(--muted);
      }

      .meta {
        border-top: 1px solid var(--border);
        padding-top: 16px;
        margin-top: 8px;
      }

      .label {
        color: var(--text);
        font-weight: 600;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover { text-decoration: underline; }

      footer {
        margin-top: 20px;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Albatros.studio</h1>
      <p>
        Collectif créatif basé en Belgique, nous développons des projets culturels
        et créatifs.
      </p>

      <section class="meta" aria-label="Informations de contact">
        <p><span class="label">Contact :</span> <a href="mailto:contact@albatros.studio">contact@albatros.studio</a></p>
        <p><span class="label">Localisation :</span> Belgique</p>
      </section>

      <footer>Mentions légales disponibles sur demande.</footer>
    </main>
  </body>
</html>
